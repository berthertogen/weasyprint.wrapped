name: build-test-code-scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
    - name: Build
      run: dotnet build --verbosity normal /p:UseSharedCompilation=false
      working-directory: ./src/Weasyprint.Wrapped
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
  build-assets-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: pwsh
        run: ./build-on-windows.ps1
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-windows
          path: ./assets/standalone-windows-64.zip
  build-assets-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: bash
        run: ./build-on-linux.sh
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-linux
          path: ./assets/standalone-linux-64.zip
  test-assets:
    needs: [build-assets-windows, build-assets-linux]
    strategy:
        matrix:
          os: [ubuntu-latest, windows-latest]
          include:
          - osname: windows
            os: windows-latest
            artifact: assets-windows
          - osname: linux
            os: ubuntu-latest
            artifact: assets-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK 8.x
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: assets
      - name: Setup Completely Isolated Font Environment
        if: runner.os == 'Linux'
        run: |
          # 1. Create a dedicated, writable font directory
          ISOLATED_FONT_DIR="/tmp/isolated_fonts_$$"
          mkdir -p "$ISOLATED_FONT_DIR"
          chmod 777 "$ISOLATED_FONT_DIR"
          
          # 2. Copy ALL system fonts to the isolated directory
          # This ensures we have DejaVu, Noto, Lato, Liberation, etc.
          sudo cp -r /usr/share/fonts/* "$ISOLATED_FONT_DIR/"
          
          # 3. Make everything in the isolated directory writable
          sudo chmod -R 777 "$ISOLATED_FONT_DIR"
          
          # 4. Generate the font cache INSIDE the isolated directory
          # This creates fonts.cache-2 in a place we can write to
          export FONTCONFIG_PATH="$ISOLATED_FONT_DIR"
          export XDG_CACHE_HOME="$ISOLATED_FONT_DIR/.cache"
          mkdir -p "$XDG_CACHE_HOME"
          fc-cache -f -v
          
          # 5. CRITICAL: Set environment variables to FORCE the app to use ONLY this dir
          # These variables override the default system paths
          echo "FONTCONFIG_PATH=$ISOLATED_FONT_DIR" >> $GITHUB_ENV
          echo "XDG_DATA_HOME=$ISOLATED_FONT_DIR" >> $GITHUB_ENV
          echo "XDG_CACHE_HOME=$ISOLATED_FONT_DIR/.cache" >> $GITHUB_ENV
          
          # 6. (Optional but recommended) Unset any variables that might force system paths
          echo "unset FONTCONFIG_FILE" >> $GITHUB_ENV
          
          # 7. Verify isolation
          echo "Isolated Dir: $ISOLATED_FONT_DIR"
          ls -ld "$ISOLATED_FONT_DIR"
          echo "Testing write in isolated dir:"
          touch "$ISOLATED_FONT_DIR/test_write" && echo "WRITE SUCCESS" || echo "WRITE FAILED"
          rm -f "$ISOLATED_FONT_DIR/test_write"

      - name: Test
        run: dotnet test --verbosity normal
        working-directory: ./src/Weasyprint.Wrapped.Tests
        env:
          FONTCONFIG_PATH: /tmp/isolated_fonts_$$
          XDG_DATA_HOME: /tmp/isolated_fonts_$$
          XDG_CACHE_HOME: /tmp/isolated_fonts_$$/.cache
          # Ensure no fallback to system paths
          FONTCONFIG_FILE: ""