name: build-test-code-scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
    - name: Build
      run: dotnet build --verbosity normal /p:UseSharedCompilation=false
      working-directory: ./src/Weasyprint.Wrapped
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
  build-assets-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: pwsh
        run: ./build-on-windows.ps1
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-windows
          path: ./assets/standalone-windows-64.zip
  build-assets-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: bash
        run: ./build-on-linux.sh
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-linux
          path: ./assets/standalone-linux-64.zip
  test-assets:
    needs: [build-assets-windows, build-assets-linux]
    strategy:
        matrix:
          os: [ubuntu-latest, windows-latest]
          include:
          - osname: windows
            os: windows-latest
            artifact: assets-windows
          - osname: linux
            os: ubuntu-latest
            artifact: assets-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK 8.x
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: assets
      - name: Setup Isolated Font Environment
        if: runner.os == 'Linux'
        run: |
          # Use a static, predictable path to avoid race conditions
          ISOLATED_DIR="/tmp/weasy_fonts_static"
          rm -rf "$ISOLATED_DIR"
          mkdir -p "$ISOLATED_DIR"
          chmod 777 "$ISOLATED_DIR"

          # 1. Copy structure
          sudo cp -r /usr/share/fonts/* "$ISOLATED_DIR/"
          sudo chmod -R 777 "$ISOLATED_DIR"

          # 2. Generate cache with correct env vars
          export FONTCONFIG_PATH="$ISOLATED_DIR"
          export XDG_CACHE_HOME="$ISOLATED_DIR/.cache"
          mkdir -p "$XDG_CACHE_HOME"
          fc-cache -f -v

          # 3. Verify cache exists
          if [ ! -f "$$ISOLATED_DIR/.cache/fonts.cache-2" ] && [ ! -f "$$ISOLATED_DIR/fonts.cache-2" ]; then
            echo "ERROR: Font cache was not generated!"
            ls -la "$ISOLATED_DIR"
            exit 1
          fi

          # 4. Set global env vars
          echo "FONTCONFIG_PATH=$ISOLATED_DIR" >> $GITHUB_ENV
          echo "XDG_DATA_HOME=$ISOLATED_DIR" >> $GITHUB_ENV
          echo "XDG_CACHE_HOME=$ISOLATED_DIR/.cache" >> $GITHUB_ENV

      - name: Test
        run: dotnet test --verbosity normal
        working-directory: ./src/Weasyprint.Wrapped.Tests
        env:
          FONTCONFIG_PATH: /tmp/weasy_fonts_static
          XDG_DATA_HOME: /tmp/weasy_fonts_static
          XDG_CACHE_HOME: /tmp/weasy_fonts_static/.cache