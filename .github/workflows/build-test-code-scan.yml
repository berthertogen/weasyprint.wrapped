name: build-test-code-scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
    - name: Build
      run: dotnet build --verbosity normal /p:UseSharedCompilation=false
      working-directory: ./src/Weasyprint.Wrapped
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
  build-assets-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: pwsh
        run: ./build-on-windows.ps1
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-windows
          path: ./assets/standalone-windows-64.zip
  build-assets-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: bash
        run: ./build-on-linux.sh
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-linux
          path: ./assets/standalone-linux-64.zip
  test-assets:
    needs: [build-assets-windows, build-assets-linux]
    strategy:
        matrix:
          os: [ubuntu-latest, windows-latest]
          include:
          - osname: windows
            os: windows-latest
            artifact: assets-windows
          - osname: linux
            os: ubuntu-latest
            artifact: assets-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK 8.x
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: assets
      - name: Setup Isolated Font Environment
        if: runner.os == 'Linux'
        run: |
          # 1. Define a static, clean path
          ISOLATED_DIR="/tmp/weasy_fonts_static"
          rm -rf "$ISOLATED_DIR"
          mkdir -p "$ISOLATED_DIR"
          chmod 777 "$ISOLATED_DIR"

          # 2. Copy fonts (preserve structure)
          sudo cp -r /usr/share/fonts/* "$ISOLATED_DIR/"
          sudo chmod -R 777 "$ISOLATED_DIR"

          # 3. Create cache directory explicitly
          CACHE_DIR="$ISOLATED_DIR/.cache/fontconfig"
          mkdir -p "$CACHE_DIR"
          sudo chmod 777 "$CACHE_DIR"

          # 4. Force fc-cache to use ONLY our directory
          # We set the env vars HERE for the duration of this command
          FONTCONFIG_PATH="$ISOLATED_DIR" \
          XDG_CACHE_HOME="$CACHE_DIR" \
          fc-cache -f -v

          # 5. Find the actual cache file (it might be in .cache/fontconfig or .cache)
          CACHE_FILE=$$(find "$$ISOLATED_DIR" -name "fonts.cache-2" -type f 2>/dev/null | head -n 1)
          
          if [ -z "$CACHE_FILE" ]; then
            echo "ERROR: Could not find fonts.cache-2!"
            echo "Contents of $ISOLATED_DIR:"
            find "$ISOLATED_DIR" -type f
            exit 1
          fi

          echo "Found cache at: $CACHE_FILE"

          # 6. Set environment variables for subsequent steps
          # We set them to the ROOT of the isolated dir, fontconfig will find the cache inside
          echo "FONTCONFIG_PATH=$ISOLATED_DIR" >> $GITHUB_ENV
          echo "XDG_CACHE_HOME=$CACHE_DIR" >> $GITHUB_ENV
          echo "XDG_DATA_HOME=$ISOLATED_DIR" >> $GITHUB_ENV

          # 7. Verify fonts are visible
          echo "Verifying fonts:"
          fc-list : family 2>/dev/null | head -5 || echo "No fonts listed (might be expected if cache is new)"
      - name: Test
        run: dotnet test --verbosity normal
        working-directory: ./src/Weasyprint.Wrapped.Tests
        env:
          FONTCONFIG_PATH: /tmp/weasy_fonts_static
          XDG_DATA_HOME: /tmp/weasy_fonts_static
          XDG_CACHE_HOME: /tmp/weasy_fonts_static/.cache