name: build-test-code-scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
    - name: Build
      run: dotnet build --verbosity normal /p:UseSharedCompilation=false
      working-directory: ./src/Weasyprint.Wrapped
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
  build-assets-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: pwsh
        run: ./build-on-windows.ps1
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-windows
          path: ./assets/standalone-windows-64.zip
  build-assets-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: bash
        run: ./build-on-linux.sh
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-linux
          path: ./assets/standalone-linux-64.zip
  test-assets:
    needs: [build-assets-windows, build-assets-linux]
    strategy:
        matrix:
          os: [ubuntu-latest, windows-latest]
          include:
          - osname: windows
            os: windows-latest
            artifact: assets-windows
          - osname: linux
            os: ubuntu-latest
            artifact: assets-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK 8.x
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: assets
      - name: Configure Font Environment for Tests
        if: runner.os == 'Linux'
        run: |
          # 1. Create writable cache directory
          mkdir -p /tmp/fontconfig-cache
          chmod 777 /tmp/fontconfig-cache
          
          # 2. CRITICAL: Make source font files writable so mtime can be updated
          # This allows the app to "touch" the files without permission errors
          sudo chmod -R 777 /usr/share/fonts
          
          # 3. Remove immutable flags if they exist (rare but possible)
          sudo chattr -i -R /usr/share/fonts 2>/dev/null || true
          
          # 4. Export environment variables
          echo "FONTCONFIG_PATH=/tmp/fontconfig-cache" >> $GITHUB_ENV
          echo "XDG_CACHE_HOME=/tmp" >> $GITHUB_ENV
          
          # 5. Pre-generate cache in the temp dir
          sudo fc-cache -f -v
      - name: Test
        run: dotnet test --verbosity normal
        working-directory: ./src/Weasyprint.Wrapped.Tests
        env:
          FONTCONFIG_PATH: /tmp/fontconfig-cache
          XDG_CACHE_HOME: /tmp

