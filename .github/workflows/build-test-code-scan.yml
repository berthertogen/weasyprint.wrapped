name: build-test-code-scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
    - name: Build
      run: dotnet build --verbosity normal /p:UseSharedCompilation=false
      working-directory: ./src/Weasyprint.Wrapped
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
  build-assets-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: pwsh
        run: ./build-on-windows.ps1
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-windows
          path: ./assets/standalone-windows-64.zip
  build-assets-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build asset
        shell: bash
        run: ./build-on-linux.sh
      - name: Upload asset
        uses: actions/upload-artifact@v6
        with:
          name: assets-linux
          path: ./assets/standalone-linux-64.zip
  test-assets:
    needs: [build-assets-windows, build-assets-linux]
    strategy:
        matrix:
          os: [ubuntu-latest, windows-latest]
          include:
          - osname: windows
            os: windows-latest
            artifact: assets-windows
          - osname: linux
            os: ubuntu-latest
            artifact: assets-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK 8.x
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: assets
      - name: Setup Writable Font Environment (Complete Override)
        if: runner.os == 'Linux'
        run: |
          # 1. Create a dedicated writable font directory
          mkdir -p /tmp/my-custom-fonts
          chmod 777 /tmp/my-custom-fonts
          
          # 2. Copy all system fonts to the writable directory
          # This ensures we have the exact same fonts but in a place we can write to
          sudo cp -r /usr/share/fonts/* /tmp/my-custom-fonts/
          
          # 3. Make the copied fonts writable
          chmod -R 777 /tmp/my-custom-fonts
          
          # 4. Generate a font cache in the writable directory
          # We point fontconfig to our custom dir
          export FONTCONFIG_PATH=/tmp/my-custom-fonts
          export XDG_CACHE_HOME=/tmp
          fc-cache -f -v
          
          # 5. Set environment variables for the test
          # We force the app to look ONLY in our writable directory
          echo "FONTCONFIG_PATH=/tmp/my-custom-fonts" >> $GITHUB_ENV
          echo "XDG_DATA_HOME=/tmp/my-custom-fonts" >> $GITHUB_ENV
          echo "XDG_CACHE_HOME=/tmp" >> $GITHUB_ENV
          
          # 6. Verify
          echo "Custom Font Dir:"
          ls -ld /tmp/my-custom-fonts
          echo "Can we write to custom dir?"
          touch /tmp/my-custom-fonts/test_write && echo "SUCCESS" || echo "FAILED"
          rm -f /tmp/my-custom-fonts/test_write
      - name: Test
        run: dotnet test --verbosity normal
        working-directory: ./src/Weasyprint.Wrapped.Tests
        env:
          FONTCONFIG_PATH: /tmp/my-custom-fonts
          XDG_DATA_HOME: /tmp/my-custom-fonts
          XDG_CACHE_HOME: /tmp

